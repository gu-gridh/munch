services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db

  db:
    image: postgres:16

    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=munch_dev
      - POSTGRES_USER=munch_user
      - POSTGRES_PASSWORD=changeme
    ports:
      - "55432:5432"

volumes:
  postgres_data:
